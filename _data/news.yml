  content: New publication alert! The paper <a href="https://doi.org/10.1021/acsomega.5c11152" target="_blank">"Low-Temperature Prediction in Commercial Lithium-Ion Batteries during Dynamic Usage via Enhanced Physics-Informed Neural Networks"</a>, authored by the graduate student Eric Pereira, has been accepted for publication in ACS Omega. Congratulations to Eric!

- date: May, 2026
  title: "Paper May 2026"
  tags:
    - some
    - tags
  content: New publication alert! The paper <a href="https://doi.org/10.1109/TIA.2026.3687187" target="_blank">"A Hybrid DVA-Machine Learning Framework for Real-Time State of Health Assessment in Commercial Lithium-Ion Batteries"</a>, authored by the graduate students Eric Pereira (first author) and Md Zawad Hossain (second author), and the undergraduate student Damilola Ogun (third author), has been accepted for publication in IEEE Transactions on Industry Applications. Congratulations to Eric, Zawad, and Dami!

